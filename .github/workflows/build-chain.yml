name: Build Chain (Rust Binary + IPK + APK)

on:
  release:
    types: [published]
  # 🚨 修复点：添加手动触发输入项，允许指定标签
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for this release (e.g. v1.0.5)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # 🟢 第一阶段：编译 Rust 核心二进制
  build_rust:
    name: 1. Build Rust Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 自动查找 Makefile 读取版本号
      - name: Get Version
        id: version
        run: |
          MAKEFILE_PATH=$(find . -name "Makefile" -print0 | xargs -0 grep -l "PKG_VERSION:=" | head -n 1)
          if [ -z "$MAKEFILE_PATH" ]; then
            echo "⚠️ Makefile not found, using default version 1.0.0"
            PKG_VERSION="1.0.0"
          else
            PKG_VERSION=$(grep "PKG_VERSION:=" "$MAKEFILE_PATH" | cut -d"=" -f2 | tr -d '[:space:]')
            echo "✅ Found version $PKG_VERSION in $MAKEFILE_PATH"
          fi
          echo "VERSION=$PKG_VERSION" >> $GITHUB_OUTPUT

      # 2. 准备 Rust 环境
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      # 3. 安装 Zig (解决 ring 编译报错)
      - name: Install Zig & Zigbuild
        run: |
          pip3 install cargo-zigbuild ziglang

      # 4. 编译 Rust
      - name: Compile Rust
        working-directory: ./athena-led
        run: |
          cargo zigbuild --release --target aarch64-unknown-linux-musl

      # 5. 打包二进制
      - name: Package Binary
        id: package
        working-directory: ./athena-led
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILENAME="athena-led-aarch64-unknown-linux-musl-v${VERSION}.tar.gz"
          mkdir -p dist
          cp target/aarch64-unknown-linux-musl/release/athena-led dist/
          cd dist
          tar -czvf ../$FILENAME athena-led
          echo "ASSET_NAME=$FILENAME" >> $GITHUB_OUTPUT
          echo "✅ Packed binary: $FILENAME"

      # 6. 上传 Rust 二进制
      - name: Upload Rust Binary to Release
        uses: softprops/action-gh-release@v1
        # 🚨 修复点：必须指定 tag_name，否则手动触发会报错
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: athena-led/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. 传递给 OpenWrt 任务
      - name: Pass Artifact to Next Job
        uses: actions/upload-artifact@v4
        with:
          name: rust-binary-tarball
          path: athena-led/*.tar.gz
          retention-days: 1

  # 🔵 第二阶段：编译 OpenWrt 安装包
  build_openwrt:
    name: 2. Build ${{ matrix.type }}
    needs: build_rust
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: ipk
            name: Stable (23.05)
            sdk_url: "https://downloads.openwrt.org/releases/23.05.5/targets/ipq807x/generic"
            use_apk: false
          - type: apk
            name: Snapshot (Qualcommax)
            sdk_url: "https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq60xx"
            use_apk: true

    steps:
      - uses: actions/checkout@v4

      - name: Download Rust Artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-binary-tarball
          path: local_dl/

      - name: Prepare SDK
        run: |
          sudo apt-get update && sudo apt-get install -y zstd
          BASE_URL="${{ matrix.sdk_url }}"
          # 🚨 优化点：更稳健的 SDK 文件名获取方式
          SDK_FILE=$(wget -qO- "$BASE_URL/sha256sums" | grep -E "sdk.*Linux-x86_64" | awk '{print $2}' | sed 's/*//g' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "❌ Error: SDK file not found in $BASE_URL"
            exit 1
          fi
          
          echo "Downloading $SDK_FILE..."
          wget -q "$BASE_URL/$SDK_FILE"
          
          if [[ "$SDK_FILE" == *.zst ]]; then
            zstd -d "$SDK_FILE" -o sdk.tar
            tar -xf sdk.tar
          else
            tar -xf "$SDK_FILE"
          fi
          
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)
          mv "$EXTRACTED_DIR" sdk
          echo "SDK prepared at ./sdk"

      - name: Inject Source into SDK
        run: |
          mkdir -p sdk/dl
          cp local_dl/*.tar.gz sdk/dl/

      - name: Configure Feeds
        working-directory: ./sdk
        run: |
          sed -i 's|git.openwrt.org/openwrt/openwrt.git|github.com/openwrt/openwrt.git|g' feeds.conf.default
          sed -i 's|git.openwrt.org/feed/packages.git|github.com/openwrt/packages.git|g' feeds.conf.default
          sed -i 's|git.openwrt.org/project/luci.git|github.com/openwrt/luci.git|g' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile Package
        working-directory: ./sdk
        run: |
          # 1. 查找真正的插件目录
          LUCI_SRC=$(find $GITHUB_WORKSPACE -maxdepth 2 -type d -name "luci-app-athena-led" | grep -v "sdk" | head -n 1)
          if [ -z "$LUCI_SRC" ]; then
            echo "❌ Error: Could not find 'luci-app-athena-led' directory!"
            exit 1
          fi

          # 2. 核心修复：物理复制
          mkdir -p package/luci-app-athena-led
          cp -r "$LUCI_SRC"/* package/luci-app-athena-led/

          # 3. 核心修复：强制转为 Unix 换行符
          sudo apt-get install -y dos2unix
          find package/luci-app-athena-led -type f -exec dos2unix {} +

          # 4. 核心修复：禁用签名检查
          echo "CONFIG_PACKAGE_luci-app-athena-led=m" > .config
          echo "CONFIG_SIGNED_PACKAGES=n" >> .config
          
          make defconfig
          make package/luci-app-athena-led/download V=s
          make package/luci-app-athena-led/compile V=s -j$(nproc)

      - name: Upload Package to Release
        uses: softprops/action-gh-release@v1
        # 🚨 修复点：必须指定 tag_name，否则手动触发会报错
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: sdk/bin/**/luci-app-athena-led*.${{ matrix.type }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
